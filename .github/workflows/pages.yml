name: Deploy demo to GitHub Pages

on:
  push:
    branches: [demo]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build library + example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install library dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install example dependencies
        working-directory: examples/nurture-pet
        run: npm install --no-audit --no-fund

      - name: Build example
        working-directory: examples/nurture-pet
        env:
          # GitHub Pages serves the repo from /<repo-name>/ by default.
          # The example's vite.config.ts reads PAGES_BASE to set the asset base.
          PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/nurture-pet/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
