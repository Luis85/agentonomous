# CI — runs on every push and PR to main, develop, and demo.
#
# Static checks (format, lint, typecheck, workflow lint, audit) run in
# parallel for fast feedback. Tests depend on the static gate passing.
# Build + bundle-size budget runs last. Mirrors the `npm run verify`
# pre-PR gate; `audit` blocks on `high`-severity vulnerabilities in
# production deps to close the supply-chain hole.
#
# Action references are pinned to full 40-char commit SHAs with the
# human-readable version as a trailing comment (supply-chain hardening
# per `docs/plans/2026-04-25-comprehensive-polish-and-harden.md` row 3).
# Run `node scripts/bump-actions.mjs` to print pending bumps; never edit
# the SHA without re-resolving via `gh api`.

name: CI

on:
  push:
    branches: [main, develop, demo]
  pull_request:
    branches: [main, develop, demo]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      # Inline path filter via the GitHub API. Replaces
      # `dorny/paths-filter@v3` (still pinned to Node 20 — emits a
      # deprecation annotation on every run with no Node 24 release
      # available). For non-PR events (push to main/develop/demo) we
      # always treat the change as code-touching and run the full gate.
      - name: Filter paths (code vs docs-only)
        id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "Non-PR event ($GITHUB_EVENT_NAME) — defaulting code=true."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pr_number="${{ github.event.pull_request.number }}"
          changed=$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$pr_number/files" --jq '.[].filename')
          echo "Changed files in PR #$pr_number:"
          printf '%s\n' "$changed"
          if printf '%s\n' "$changed" | grep -E '^(src/|tests/|examples/|scripts/|\.github/workflows/|package(-lock)?\.json|tsconfig[^/]*\.json|vite\.config\.|vitest\.config\.|eslint\.config\.|typedoc\.json)' >/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  format-check:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Check formatting
        run: npm run format:check

  lint:
    name: Lint (ESLint)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Run TypeScript compiler
        run: npm run typecheck

  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  audit:
    name: Audit production deps (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Audit production dependencies (high severity blocks)
        run: npm audit --omit=dev --audit-level=high

  docs:
    name: API docs (typedoc)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      # Typedoc runs as a wiring/coverage check — a clean generation
      # proves every exported symbol is reachable and documented.
      # The generated `docs/api/` is regenerated on demand locally; we
      # do not consume the artifact in CI, so skip the upload step.
      - name: Generate API docs (typedoc)
        run: npm run docs

  # Vitest split into two jobs (row 4 of the polish-and-harden roadmap):
  #
  # - `test-core` runs the FULL vitest suite (with coverage) on the OS
  #   matrix. Coverage upload still happens here once per push because
  #   `test-tfjs` re-runs the same tfjs files under different backends
  #   and would only inflate runtime, not coverage.
  # - `test-tfjs` runs ONLY `tests/**/cognition/adapters/tfjs/**` under the
  #   `cpu` × `wasm` backend axis. The matrix-selected backend is
  #   activated by `tests/setup/tfjsBackendSetup.ts` via the
  #   `TFJS_BACKEND` env var (see `tests/setup/tfjsBackend.ts`).
  #
  #   `tests/examples/learningMode.train.test.ts` deliberately stays out
  #   of `test-tfjs`: the demo's switcher probes cpu first then promotes
  #   the persisted backend, so under `TFJS_BACKEND=wasm` the suite still
  #   exercises the cpu-fallback flow (the demo's intended user path).
  #   Adding it to the wasm cell would burn runtime without catching new
  #   regressions; reasoner-level wasm coverage already lives in
  #   `tests/unit/cognition/adapters/Tfjs*.test.ts`.
  #
  # `fail-fast: false` keeps platform-specific failures from suppressing
  # other cells — a windows-only flake should not hide a wasm-only one.
  test-core:
    name: Test core (Vitest, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes, format-check, lint, typecheck, actionlint, audit, docs]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      # Coverage runs on ubuntu only (the report is identical across
      # OSes; running v8 coverage on every cell triples test runtime
      # for no signal). Other cells run the same tests without the
      # coverage instrumentation overhead.
      - name: Run Vitest with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
      - name: Run Vitest
        if: matrix.os != 'ubuntu-latest'
        run: npm test

  test-tfjs:
    name: Test tfjs (${{ matrix.backend }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes, format-check, lint, typecheck, actionlint, audit, docs]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        backend: [cpu, wasm]
    env:
      TFJS_BACKEND: ${{ matrix.backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      # Targeted vitest invocation — only the test files that load a
      # tfjs backend matter for the backend axis. Non-tfjs tests are
      # already covered by `test-core` above; re-running them here
      # would burn ~5x the runtime for zero extra signal.
      - name: Run tfjs adapter tests
        run: >
          npx vitest run
          tests/unit/cognition/adapters/TfjsReasoner.test.ts
          tests/unit/cognition/adapters/TfjsLearner.test.ts
          tests/unit/cognition/adapters/TfjsSnapshot.test.ts

  build:
    name: Build & size budget
    runs-on: ubuntu-latest
    needs: [changes, test-core, test-tfjs]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Build library (vite build)
        run: npm run build
      - name: Enforce bundle-size budget
        run: npx size-limit

  size-limit-comment:
    name: Size-limit PR comment (gzip delta)
    runs-on: ubuntu-latest
    needs: [changes, build]
    # Run after build for ordering, but post the delta comment
    # regardless of build outcome — the size-budget failure is exactly
    # when the reviewer needs to see which bytes regressed. Skip on
    # docs-only PRs since `build` is skipped there and there are no
    # bundle bytes to compare.
    if: |
      always()
      && needs.changes.outputs.code == 'true'
      && github.event_name == 'pull_request'
      && needs.build.result != 'cancelled'
      && needs.build.result != 'skipped'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      # andresz1/size-limit-action@v1 is the only remaining Node 20
      # action in this workflow — no Node 24 fork exists yet, and the
      # sticky-comment delta UX is high value, so we accept the single
      # residual deprecation annotation until upstream cuts a Node 24
      # release. Path-filter has been inlined; this is the only one left.
      - name: Size Limit (sticky PR comment with gzip delta)
        uses: andresz1/size-limit-action@e7493a72a44b113341c0cf6186ab49c17c4b65c1 # v1.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Action runs `npm run <build_script>` then `npx size-limit --json`
          # internally. Older `script` / `package_manager` inputs were
          # removed upstream and now trigger schema warnings.
          build_script: build

  demo-build:
    name: Demo build (examples/nurture-pet)
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install library dependencies (npm ci)
        run: npm ci
      - name: Build library (vite build)
        run: npm run build
      - name: Install demo dependencies (npm ci)
        working-directory: examples/nurture-pet
        run: npm ci --no-audit --no-fund
      - name: Build demo (vite build)
        working-directory: examples/nurture-pet
        run: npm run build

  ci-gate:
    # Single required status check on `develop` / `main` / `demo`. Treats
    # legitimately-skipped jobs (docs-only PRs) as success while still
    # failing on any actual job failure or cancellation. Wire branch
    # protection to require ONLY this check — keeps the gate stable when
    # adding/removing jobs above.
    name: CI gate (required check)
    runs-on: ubuntu-latest
    needs:
      - changes
      - format-check
      - lint
      - typecheck
      - actionlint
      - audit
      - docs
      - test-core
      - test-tfjs
      - build
      - demo-build
    if: always()
    steps:
      - name: Verify all needed jobs succeeded or were skipped
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_JSON"
          echo "$NEEDS_JSON" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'
