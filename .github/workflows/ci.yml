# CI — runs on every push and PR to main, develop, and demo.
#
# Static checks (format, lint, typecheck) run in parallel for fast
# feedback. Tests depend on all three passing. Build + bundle-size
# budget runs last. Mirrors the `npm run verify` pre-PR gate.

name: CI

on:
  push:
    branches: [main, develop, demo]
  pull_request:
    branches: [main, develop, demo]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Check formatting
        run: npm run format:check

  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Run TypeScript compiler
        run: npm run typecheck

  test:
    name: Test (Vitest + coverage)
    runs-on: ubuntu-latest
    needs: [format-check, lint, typecheck]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Run Vitest with coverage
        run: npm run test:coverage

  build:
    name: Build & size budget
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: Build library (vite build)
        run: npm run build
      - name: Enforce bundle-size budget
        run: npx size-limit
