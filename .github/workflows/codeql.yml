# CodeQL — GitHub-native static analysis for security + quality.
#
# Runs on every push/PR to the long-lived branches and on a weekly
# schedule so advisories published against already-merged code still
# surface. Findings land under Security → Code scanning alerts.

name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, demo]
  schedule:
    # Mondays 06:00 UTC — staggered from Dependabot's run.
    - cron: '0 6 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
