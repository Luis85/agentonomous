<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nurture pet demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        min-height: 100vh;
        background: #f5f5f7;
        color: #0b1120;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0b1120;
          color: #e6e6f0;
        }
      }
      .stage {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      @media (prefers-color-scheme: dark) {
        .stage {
          background: #1b2140;
        }
      }
      .pet-canvas {
        width: 192px;
        height: 192px;
        border-radius: 96px;
        display: grid;
        place-items: center;
        font-size: 64px;
        transition:
          background 0.3s,
          transform 0.3s;
      }
      .pet-meta {
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .hud {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bars,
      .modifiers,
      .buttons,
      .trace {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
      }
      @media (prefers-color-scheme: dark) {
        .bars,
        .modifiers,
        .buttons,
        .trace {
          background: #1b2140;
        }
      }
      .bar {
        display: grid;
        grid-template-columns: 120px 1fr auto;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .bar-track {
        height: 12px;
        border-radius: 6px;
        background: #e2e8f0;
        overflow: hidden;
      }
      @media (prefers-color-scheme: dark) {
        .bar-track {
          background: #26304d;
        }
      }
      .bar-fill {
        height: 100%;
        background: #38bdf8;
        transition: width 0.3s;
      }
      .bar-fill.critical {
        background: #f43f5e;
      }
      .modifiers ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .modifiers li {
        padding: 4px 8px;
        border-radius: 6px;
        background: #fef3c7;
        color: #713f12;
        font-size: 12px;
      }
      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .speed {
        background: #fff;
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      @media (prefers-color-scheme: dark) {
        .speed {
          background: #1b2140;
        }
      }
      .speed-label {
        font-size: 12px;
        opacity: 0.7;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .speed-buttons {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .speed-buttons button {
        padding: 6px 10px;
        font-size: 13px;
        background: #475569;
      }
      .speed-buttons button:hover {
        background: #334155;
      }
      .speed-buttons button.active {
        background: #16a34a;
        box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.35);
      }
      .modifiers li {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .modifiers .mod-time {
        font-variant-numeric: tabular-nums;
        opacity: 0.7;
        font-size: 11px;
      }
      button {
        padding: 8px 14px;
        border-radius: 8px;
        border: none;
        background: #4f46e5;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: #4338ca;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .trace pre {
        font-size: 11px;
        max-height: 160px;
        overflow: auto;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <section class="stage">
      <div id="pet" class="pet-canvas" style="background: #fde68a">🐱</div>
      <div class="pet-meta">
        <div><strong id="pet-name">whiskers</strong></div>
        <div id="pet-stage">stage: egg</div>
        <div id="pet-age">age: 0s</div>
        <div id="pet-mood">mood: —</div>
        <div id="pet-animation">anim: idle</div>
      </div>
    </section>

    <section class="hud">
      <div class="speed">
        <span class="speed-label">Speed</span>
        <div class="speed-buttons" id="speed-picker"></div>
      </div>
      <div class="bars" id="bars"></div>
      <div class="modifiers">
        <strong>Buffs / debuffs</strong>
        <ul id="modifier-list"></ul>
      </div>
      <div class="buttons" id="buttons"></div>
      <div class="trace">
        <strong>Recent events</strong>
        <pre id="trace"></pre>
      </div>
    </section>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
