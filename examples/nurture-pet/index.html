<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nurture pet demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        min-height: 100vh;
        background: #f5f5f7;
        color: #0b1120;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0b1120;
          color: #e6e6f0;
        }
      }
      .stage {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      @media (prefers-color-scheme: dark) {
        .stage {
          background: #1b2140;
        }
      }
      .pet-canvas {
        width: 192px;
        height: 192px;
        border-radius: 96px;
        display: grid;
        place-items: center;
        font-size: 64px;
        transition:
          background 0.3s,
          transform 0.3s;
      }
      .pet-meta {
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .hud {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bars,
      .modifiers,
      .buttons,
      .trace {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
      }
      @media (prefers-color-scheme: dark) {
        .bars,
        .modifiers,
        .buttons,
        .trace {
          background: #1b2140;
        }
      }
      .bar {
        display: grid;
        grid-template-columns: 120px 1fr auto;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .bar-track {
        height: 12px;
        border-radius: 6px;
        background: #e2e8f0;
        overflow: hidden;
      }
      @media (prefers-color-scheme: dark) {
        .bar-track {
          background: #26304d;
        }
      }
      .bar-fill {
        height: 100%;
        background: #38bdf8;
        transition: width 0.3s;
      }
      .bar-fill.critical {
        background: #f43f5e;
        animation: critical-pulse 1.1s ease-in-out infinite;
      }
      @keyframes critical-pulse {
        0%,
        100% {
          opacity: 1;
          filter: brightness(1);
        }
        50% {
          opacity: 0.75;
          filter: brightness(1.15);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .bar-fill.critical {
          animation: none;
        }
      }
      .modifiers ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .modifiers li {
        padding: 4px 8px;
        border-radius: 6px;
        background: #fef3c7;
        color: #713f12;
        font-size: 12px;
      }
      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .speed {
        background: #fff;
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      @media (prefers-color-scheme: dark) {
        .speed {
          background: #1b2140;
        }
      }
      .cognition-switcher {
        background: #fff;
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      @media (prefers-color-scheme: dark) {
        .cognition-switcher {
          background: #1b2140;
        }
      }
      .cognition-label {
        font-size: 12px;
        opacity: 0.7;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      #cognition-mode-select {
        padding: 4px 8px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: inherit;
        color: inherit;
      }
      #cognition-mode-select:disabled {
        opacity: 0.5;
      }
      .cognition-status {
        font-size: 12px;
        opacity: 0.6;
        margin-left: auto;
        font-variant-numeric: tabular-nums;
      }
      .speed-label {
        font-size: 12px;
        opacity: 0.7;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .speed-buttons {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .speed-buttons button {
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 500;
        background: transparent;
        color: inherit;
        border: 1px solid #cbd5e1;
        opacity: 0.75;
      }
      .speed-buttons button:hover {
        background: #e2e8f0;
        opacity: 1;
      }
      .speed-buttons button.active {
        background: #475569;
        color: #fff;
        border-color: #475569;
        opacity: 1;
      }
      @media (prefers-color-scheme: dark) {
        .speed-buttons button {
          border-color: #334155;
        }
        .speed-buttons button:hover {
          background: #26304d;
        }
        .speed-buttons button.active {
          background: #cbd5e1;
          color: #0f172a;
          border-color: #cbd5e1;
        }
      }
      .reset-button {
        margin-left: auto;
        padding: 6px 10px;
        font-size: 13px;
        background: #94a3b8;
      }
      .reset-button:hover {
        background: #64748b;
      }
      .io-button {
        padding: 6px 10px;
        font-size: 13px;
        background: #64748b;
      }
      .io-button:hover {
        background: #475569;
      }
      .seed {
        background: #fff;
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 13px;
      }
      @media (prefers-color-scheme: dark) {
        .seed {
          background: #1b2140;
        }
      }
      .seed-label {
        font-size: 12px;
        opacity: 0.7;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .seed-value {
        font-family: ui-monospace, SFMono-Regular, monospace;
        padding: 4px 8px;
        border-radius: 6px;
        background: #e2e8f0;
        color: #0f172a;
        user-select: all;
      }
      @media (prefers-color-scheme: dark) {
        .seed-value {
          background: #26304d;
          color: #e6e6f0;
        }
      }
      .seed-button {
        padding: 6px 10px;
        font-size: 13px;
        background: #64748b;
      }
      .seed-button:hover {
        background: #475569;
      }
      .modifiers li {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .modifiers .mod-time {
        font-variant-numeric: tabular-nums;
        opacity: 0.7;
        font-size: 11px;
      }
      button {
        padding: 8px 14px;
        border-radius: 8px;
        border: none;
        background: #4f46e5;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: #4338ca;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .trace pre {
        font-size: 11px;
        max-height: 160px;
        overflow: auto;
        margin: 0;
      }
      .decision-trace {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      @media (prefers-color-scheme: dark) {
        .decision-trace {
          background: #1b2140;
        }
      }
      .decision-trace-toggle {
        background: #64748b;
        font-size: 13px;
        padding: 6px 10px;
        align-self: flex-start;
      }
      .decision-trace-toggle:hover {
        background: #475569;
      }
      .decision-trace[data-visible='false'] #decision-trace-body {
        display: none;
      }
      #decision-trace-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      .trace-section h4 {
        margin: 0 0 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        opacity: 0.7;
      }
      .trace-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 2px 0;
      }
      .trace-k {
        opacity: 0.8;
      }
      .trace-v {
        font-family: ui-monospace, SFMono-Regular, monospace;
      }
      .trace-empty {
        opacity: 0.6;
        font-style: italic;
      }
      .trace-why {
        margin-top: 6px;
        opacity: 0.75;
        font-style: italic;
      }
      .species-config {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      @media (prefers-color-scheme: dark) {
        .species-config {
          background: #1b2140;
        }
      }
      .species-config-toggle {
        background: #64748b;
        font-size: 13px;
        padding: 6px 10px;
        align-self: flex-start;
      }
      .species-config-toggle:hover {
        background: #475569;
      }
      .species-config[data-visible='false'] #species-config-body {
        display: none;
      }
      #species-config-body {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #species-config-textarea {
        width: 100%;
        min-height: 180px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        resize: vertical;
        box-sizing: border-box;
      }
      @media (prefers-color-scheme: dark) {
        #species-config-textarea {
          background: #0f172a;
          color: #e6e6f0;
          border-color: #334155;
        }
      }
      .species-config-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .species-config-actions button {
        font-size: 13px;
        padding: 6px 10px;
      }
      #species-config-apply {
        background: #16a34a;
      }
      #species-config-apply:hover {
        background: #15803d;
      }
      #species-config-reset {
        background: #94a3b8;
      }
      #species-config-reset:hover {
        background: #64748b;
      }
      #species-config-status {
        font-size: 12px;
        min-height: 16px;
        font-variant-numeric: tabular-nums;
      }
      #species-config-status[data-kind='error'] {
        color: #dc2626;
      }
      #species-config-status[data-kind='ok'] {
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <section class="stage">
      <div id="pet" class="pet-canvas" style="background: #fde68a">🐱</div>
      <div class="pet-meta">
        <div><strong id="pet-name">whiskers</strong></div>
        <div id="pet-stage">stage: egg</div>
        <div id="pet-mood">mood: —</div>
        <div id="pet-animation">anim: idle</div>
      </div>
    </section>

    <section class="hud">
      <div class="cognition-switcher" id="cognition-switcher">
        <span class="cognition-label">Cognition</span>
        <select id="cognition-mode-select" aria-label="Cognition mode">
          <option value="heuristic">Heuristic (urgency)</option>
        </select>
        <span class="cognition-status" id="cognition-status" data-mode="heuristic">active</span>
        <button id="train-network" type="button" hidden>Train</button>
      </div>
      <div class="speed">
        <span class="speed-label">Speed</span>
        <div class="speed-buttons" id="speed-picker"></div>
        <button id="export-button" class="io-button" type="button">💾 Export</button>
        <button id="import-button" class="io-button" type="button">📂 Import</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden />
        <button id="reset-button" class="reset-button" type="button">🔄 Reset</button>
      </div>
      <div class="seed">
        <span class="seed-label">Seed</span>
        <code id="seed-display" class="seed-value" aria-label="Current RNG seed"></code>
        <button id="seed-copy" class="seed-button" type="button" aria-label="Copy seed">
          📋 Copy
        </button>
        <button
          id="seed-replay"
          class="seed-button"
          type="button"
          aria-label="Replay this seed"
          title="Reset the pet, keep the seed — the RNG stream will be byte-identical"
        >
          🔁 Replay seed
        </button>
        <button
          id="seed-new"
          class="seed-button"
          type="button"
          aria-label="Reset with a new seed"
          title="Generate a new seed and reset the pet"
        >
          🎲 New seed
        </button>
      </div>
      <div class="bars" id="bars"></div>
      <div class="modifiers">
        <strong>Buffs / debuffs</strong>
        <ul id="modifier-list"></ul>
      </div>
      <div class="buttons" id="buttons"></div>
      <div class="trace">
        <strong>Recent events</strong>
        <pre id="trace"></pre>
      </div>
      <div id="decision-trace" class="decision-trace" data-visible="false">
        <button
          id="decision-trace-toggle"
          class="decision-trace-toggle"
          type="button"
          aria-controls="decision-trace-body"
          aria-expanded="false"
        >
          Show decision trace
        </button>
        <div id="decision-trace-body"></div>
      </div>
      <div id="species-config" class="species-config" data-visible="false">
        <button
          id="species-config-toggle"
          class="species-config-toggle"
          type="button"
          aria-controls="species-config-body"
          aria-expanded="false"
        >
          Show species config
        </button>
        <div id="species-config-body">
          <textarea
            id="species-config-textarea"
            spellcheck="false"
            aria-label="Species configuration JSON"
          ></textarea>
          <div id="species-config-status" data-kind="ok"></div>
          <div class="species-config-actions">
            <button id="species-config-apply" type="button">Apply &amp; reset</button>
            <button id="species-config-reset" type="button">Reset to defaults</button>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
